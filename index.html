<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow</title>
    <!-- Bootstrap 5 CSS (Mobile First) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Estilos personalizados (solo para la lista y botones) -->
    <!-- <link rel="stylesheet" href="styles/main.css" /> -->
  </head>
  <style>
    /* styles/main.css */
    /* Estilos para la lista de tareas (se mantienen para no romper la vista) */
    #task-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    #task-list li {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      background: white;
      border: 1px solid #dee2e6;
      border-radius: 0.375rem;
    }

    #task-list li span {
      flex: 1;
    }

    .completada span {
      text-decoration: line-through;
      color: #6c757d;
    }

    /* Botones personalizados (se conservan clases usadas en ui.js) */
    .btn-completar {
      background-color: #28a745;
      color: white;
      border: none;
      padding: 0.25rem 0.75rem;
      border-radius: 0.25rem;
      font-size: 0.875rem;
      cursor: pointer;
    }

    .btn-completar:hover {
      background-color: #218838;
    }

    .btn-eliminar {
      background-color: #dc3545;
      color: white;
      border: none;
      padding: 0.25rem 0.75rem;
      border-radius: 0.25rem;
      font-size: 0.875rem;
      cursor: pointer;
    }

    .btn-eliminar:hover {
      background-color: #c82333;
    }
  </style>
  <body class="bg-light">
    <div class="container py-4">
      <h1 class="display-4 mb-4">TaskFlow</h1>

      <!-- Formulario con Bootstrap -->
      <form id="task-form" class="row g-2 mb-4">
        <div class="col-8 col-sm-9">
          <input
            type="text"
            id="task-input"
            class="form-control"
            placeholder="Nueva tarea..."
            required
          />
        </div>
        <div class="col-4 col-sm-3">
          <button type="submit" class="btn btn-primary w-100">Agregar</button>
        </div>
      </form>

      <!-- Lista de tareas (el JavaScript añadirá <li> con clases propias) -->
      <ul id="task-list" class="list-unstyled">
        <!-- Las tareas se renderizarán aquí -->
      </ul>
    </div>

    <!-- Dependencias de Bootstrap (jQuery, Popper, Bootstrap JS) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>

    <!-- Orden de carga: modelo → servicios → vista → controlador → app -->
    <script src="src/models/tarea.model.js"></script>
    <script src="src/services/storageService.js"></script>
    <script src="src/views/ui.js"></script>
    <script src="src/controllers/eventHandlers.js"></script>
    <script src="app.js"></script>
  </body>
</html>
